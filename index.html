<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassyGen - CSS Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Glassmorphism Generator</h1>
        
        <div class="main-layout">
            <div class="controls">
                <div class="control-group">
                    <label>Blur Intensity</label>
                    <input type="range" id="blur" min="0" max="20" value="5">
                </div>
                <div class="control-group">
                    <label>Transparency (Opacity)</label>
                    <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.3">
                </div>
                <div class="control-group">
                    <label>Color</label>
                    <input type="color" id="color" value="#ffffff">
                </div>
                <div class="code-output">
                    <pre id="css-code">backdrop-filter: blur(5px);</pre>
                    <button id="copy-btn">Copy Code</button>
                </div>
            </div>

            <div class="preview-area">
                <div id="glass-card" class="glass-card">
                    <h3>Preview Card</h3>
                    <p>Change sliders to see the magic!</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
